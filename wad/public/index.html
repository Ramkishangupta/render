<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <style>
        .nav-link:hover{
            background-color: grey;
            border-radius: 5px;
        }
        .zoom-card:hover{
            transform: scale(1.05);
            transition: 0.3s ease-in-out;
            cursor: pointer;
        }
    </style>
  </head>
  <body class="bg-light">
    <div class="container-fluid">
      <div class="row vh-100">
        <div class="col-2 bg-dark text-white p-3">
          <h3 class="border-bottom mb-2 p-2">Admin Panel</h3>
          <ul class="nav flex-column">
            <li><a href="#" class="nav-link text-white">Dashboard</a></li>
            <li><a href="#" class="nav-link text-white">Orders</a></li>
            <li><a href="#" class="nav-link text-white">Products</a></li>
            <li><a href="#" class="nav-link text-white">Customers</a></li>
          </ul>
        </div>

        <div class="col-10">
            <h3 class="p-3 mb-2 border-bottom">Ecommerce Stats</h3>

            <div class="row fs-wrap" >
                <div class="col-3 mt-4">
                    <div class="card card-body bg-primary text-white text-center zoom-card">
                        <h4>Total Spent</h4>
                        <h5>$25650</h5>
                    </div>
                </div>
                <div class="col-3 mt-4">
                    <div class="card card-body bg-warning text-white text-center zoom-card">
                        <h4>Total Orders</h4>
                        <h5>1500</h5>
                    </div>
                </div>
                <div class="col-3 mt-4">
                    <div class="card card-body bg-danger text-white text-center zoom-card">
                        <h4>New users</h4>
                        <h5>500</h5>
                    </div>
                </div>
                <div class="col-3 mt-4">
                    <div class="card card-body bg-success text-white text-center zoom-card">
                        <h4>Returns</h4>
                        <h5>150</h5>
                    </div>
                </div>
                <div class="col-3 mt-4">
                    <div class="card card-body bg-secondary text-white text-center zoom-card">
                        <h4>Total Profit</h4>
                        <h5>30%</h5>
                    </div>
                </div>
                <div class="col-3 mt-4">
                    <div class="card card-body bg-success text-white text-center zoom-card">
                        <h4>No of Stores</h4>
                        <h5>50</h5>
                    </div>
                </div>

            </div>

        </div>
      </div>
    </div>
  </body>
</html>
